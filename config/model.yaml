seasons:
  # Unsupervised models (pitch archetypes): use all data for stable clusters
  clustering: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  # Predictive models: train on all complete seasons, project into 2026
  train: [2020, 2021, 2022, 2023, 2024, 2025]
  # Backtesting used walk-forward folds; 2025 is now fully available for training
  projection_target: 2026
  all_available: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]

sampling:
  draws: 2000
  tune: 1000
  chains: 4
  target_accept: 0.95
  random_seed: 42

cache:
  directory: data/cached
  format: parquet

in_season:
  current_season: 2026
  min_pa_for_update: 10
  min_bf_for_update: 10
  new_player_prior_strength: 50
  n_k_samples: 8000
  mlb_api_base: "https://statsapi.mlb.com/api/v1"

game_k:
  n_mc_draws: 4000
  bf_min: 3
  bf_max: 35
  bf_shrinkage_k: 2.4
  pop_bf_mu: 22.0
  pop_bf_sigma: 4.5
  pop_within_pitcher_std: 3.4
  min_bf_for_evaluation: 15
  k_lines: [0.5, 1.5, 2.5, 3.5, 4.5, 5.5, 6.5, 7.5, 8.5, 9.5, 10.5, 11.5, 12.5]

clustering:
  hitter_k: 6
  pitcher_k: 6
  archetype_matchup_min_pa: 100
  archetype_matchup_seasons: [2020, 2021, 2022, 2023, 2024, 2025]

# Posterior calibration T per stat.
# T < 1.0 narrows CIs (if backtests show over-coverage at 80% level).
# T > 1.0 widens CIs (if backtests show under-coverage).
# T = 1.0 disables calibration (default).
# Run walk-forward backtests to compute optimal T per stat.
season_sim:
  n_seasons: 200
  starter_n_starts_pop: 30
  starter_n_starts_sd: 6
  reliever_min_games: 10
  cl_sv_threshold: 24
  su_hld_threshold: 24
  unearned_run_fraction: 0.08
  random_seed: 42

calibration:
  hitter:
    k_rate: 1.0
    bb_rate: 1.0
    gb_rate: 1.0
    fb_rate: 1.0
    hr_per_fb: 1.0
    woba: 1.0
    chase_rate: 1.0
  pitcher:
    k_rate: 1.0
    bb_rate: 1.0
    hr_per_bf: 1.0
