# Thresholds for automated change safety validation
# Used by scripts/validate_change_safety.py

schema:
  # Required columns in key output parquets
  game_props:
    required_prefix: ["p_over_"]  # at least one p_over_* column must exist
    required_columns: ["player_id", "game_date", "stat", "expected"]
  hitter_projections:
    required_columns: ["batter_id", "projected_k_rate", "season"]
  pitcher_projections:
    required_columns: ["pitcher_id", "projected_k_rate", "season"]
  backtest_game_prop_summary:
    required_columns: ["stat", "ece", "rmse", "temperature"]

thresholds:
  # Maximum acceptable values (fail if exceeded)
  max_ece: 0.08
  max_temperature_deviation: 0.3  # |temperature - 1.0|
  max_rmse_pitcher_k: 2.5
